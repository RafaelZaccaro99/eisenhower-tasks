name: CI
on:
  push:
    branches: [master]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: ELECTRON_SKIP_BINARY_DOWNLOAD=1 npm ci
      - run: npm run build
      - run: npm run test:run
